<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Instagram</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 로그인 화면 -->
    <div id="authScreen" class="auth-screen is-active">
        <div class="auth-container">
            <div class="auth-images">
                <div class="phone-frame"></div>
            </div>

            <div class="auth-forms">
                <!-- 로그인 카드 -->
                <div class="auth-card" id="loginCard">
                    <div class="instagram-logo">Instagram</div>

                    <form id="loginForm" class="auth-form">
                        <input type="email" id="loginEmail" placeholder="이메일" required>
                        <input type="password" id="loginPassword" placeholder="비밀번호" required>
                        <button type="submit" class="auth-btn">로그인</button>
                    </form>

                    <div class="auth-divider">
                        <span>또는</span>
                    </div>

                    <button type="button" class="facebook-btn">Facebook으로 로그인</button>
                    <a href="#" class="forgot-password">비밀번호를 잊으셨나요?</a>
                </div>

                <!-- 회원가입 카드 -->
                <div class="auth-card" id="signupCard" style="display: none;">
                    <div class="instagram-logo">Instagram</div>
                    <p class="auth-subtitle">친구들의 사진과 동영상을 보려면 가입하세요.</p>

                    <button type="button" class="facebook-btn">Facebook으로 가입</button>

                    <div class="auth-divider">
                        <span>또는</span>
                    </div>

                    <form id="signupForm" class="auth-form">
                        <input type="email" id="signupEmail" placeholder="이메일" required>
                        <input type="text" id="signupUsername" placeholder="사용자명" required minlength="3" maxlength="30">
                        <input type="text" id="signupFullname" placeholder="성명" required maxlength="100">
                        <input type="password" id="signupPassword" placeholder="비밀번호 (최소 8자)" required minlength="8">
                        <button type="submit" class="auth-btn">가입</button>
                    </form>
                </div>

                <!-- 전환 버튼 -->
                <div class="auth-card">
                    <span id="toggleSignup">계정이 없으신가요? <a href="#">가입하기</a></span>
                    <span id="toggleLogin" style="display: none;">계정이 있으신가요? <a href="#">로그인</a></span>
                </div>
            </div>
        </div>
    </div>

    <!-- 메인 앱 -->
    <div id="mainApp" class="main-app" style="display: none;">
        <!-- 상단 헤더 -->
        <header class="header">
            <div class="header-container">
                <div class="logo">Instagram</div>

                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 검색">
                </div>

                <div class="header-actions">
                    <button class="icon-btn" title="탐색" id="exploreHeaderBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                        </svg>
                    </button>
                    <button class="icon-btn" title="좋아요" id="likesHeaderBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                    </button>
                    <button class="icon-btn" title="메시지" id="messagesHeaderBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </button>
                    <div class="user-menu">
                        <button id="profileBtn" class="icon-btn profile-btn" title="프로필">
                            <div id="headerAvatar" class="avatar-small">U</div>
                        </button>
                        <div class="dropdown-menu" style="display: none;">
                            <a href="#" data-action="go-profile">프로필</a>
                            <a href="#" data-action="go-settings">설정</a>
                            <hr>
                            <a href="#" data-action="logout">로그아웃</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- 메인 컨텐츠 -->
        <div class="app-body">
            <!-- 좌측 사이드바 -->
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <button class="nav-item is-active" data-section="home">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"/>
                        </svg>
                        <span>홈</span>
                    </button>
                    <button class="nav-item" data-section="explore">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <circle cx="12" cy="12" r="5"/>
                            <path d="M12 7v10M7 12h10"/>
                        </svg>
                        <span>탐색</span>
                    </button>
                    <button class="nav-item" data-section="reels">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="23 7 16 12 23 17 23 7"></polygon>
                            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                        </svg>
                        <span>릴스</span>
                    </button>
                    <button class="nav-item" data-section="messages">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <span>메시지</span>
                    </button>
                    <button class="nav-item" data-section="likes">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                        </svg>
                        <span>좋아요</span>
                    </button>
                    <button class="nav-item" data-section="bookmarks">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h10l6 6v11a2 2 0 0 1-2 2z"></path>
                        </svg>
                        <span>북마크</span>
                    </button>
                    <button class="nav-item" data-section="profile">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span>프로필</span>
                    </button>
                </nav>

                <button class="nav-item create-btn" data-section="upload">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <line x1="12" y1="8" x2="12" y2="16"/>
                        <line x1="8" y1="12" x2="16" y2="12"/>
                    </svg>
                    <span>만들기</span>
                </button>
            </aside>

            <!-- 중앙 피드 -->
            <main class="feed-container">
                <!-- 홈 섹션 -->
                <section id="homeSection" class="section is-active">
                    <div class="stories-container">
                        <div class="stories">
                            <button class="story-item your-story">
                                <div class="story-avatar">+</div>
                                <span>스토리</span>
                            </button>
                        </div>
                    </div>
                    <div id="feedContainer" class="feed"></div>
                </section>

                <!-- 탐색 섹션 -->
                <section id="exploreSection" class="section" style="display: none;">
                    <div id="exploreGrid" class="explore-grid"></div>
                </section>

                <!-- 릴스 섹션 -->
                <section id="reelsSection" class="section" style="display: none;">
                    <div class="reels-container">
                        <h2>릴스</h2>
                        <p>짧은 동영상 콘텐츠를 탐색해보세요</p>
                        <div id="reelsList" class="reels-list"></div>
                    </div>
                </section>

                <!-- 메시지 섹션 -->
                <section id="messagesSection" class="section" style="display: none;">
                    <div class="messages-container">
                        <h2>메시지</h2>
                        <div id="messagesList" class="messages-list"></div>
                    </div>
                </section>

                <!-- 좋아요 섹션 -->
                <section id="likesSection" class="section" style="display: none;">
                    <h2>좋아요한 게시물</h2>
                    <div id="likesList" class="feed"></div>
                </section>

                <!-- 북마크 섹션 -->
                <section id="bookmarksSection" class="section" style="display: none;">
                    <h2>북마크</h2>
                    <div id="bookmarksList" class="feed"></div>
                </section>

                <!-- 프로필 섹션 -->
                <section id="profileSection" class="section" style="display: none;">
                    <div class="profile-container">
                        <div class="profile-header">
                            <div id="profileAvatar" class="profile-avatar">U</div>
                            <div class="profile-info">
                                <h1 id="profileUsername">사용자명</h1>
                                <p id="profileBio">프로필 설명</p>
                                <div class="profile-stats">
                                    <div><strong id="profilePostCount">0</strong> 게시물</div>
                                    <div><strong id="profileFollowerCount">0</strong> 팔로워</div>
                                    <div><strong id="profileFollowingCount">0</strong> 팔로잉</div>
                                </div>
                            </div>
                            <button class="edit-profile-btn">프로필 편집</button>
                        </div>

                        <div class="profile-tabs">
                            <button class="tab-btn is-active" data-tab="posts">게시물</button>
                            <button class="tab-btn" data-tab="likes">좋아요한 게시물</button>
                            <button class="tab-btn" data-tab="bookmarks">북마크</button>
                            <button class="tab-btn" data-tab="following">팔로잉</button>
                        </div>

                        <div id="profilePosts" class="explore-grid"></div>
                        <div id="profileLikes" class="explore-grid" style="display: none;"></div>
                        <div id="profileBookmarks" class="explore-grid" style="display: none;"></div>
                        <div id="profileFollowing" class="following-list" style="display: none;"></div>
                    </div>
                </section>

                <!-- 업로드 섹션 -->
                <section id="uploadSection" class="section" style="display: none;">
                    <div class="upload-container">
                        <h2>새 게시물</h2>
                        <form id="uploadForm" class="upload-form">
                            <div class="upload-area">
                                <div class="upload-dropzone">
                                    <input type="file" id="fileInput" accept="image/*,video/*" multiple>
                                    <div class="dropzone-content">
                                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                            <polyline points="17 8 12 3 7 8"></polyline>
                                            <line x1="12" y1="3" x2="12" y2="15"></line>
                                        </svg>
                                        <p>사진이나 동영상을 여기로 끌어오세요</p>
                                    </div>
                                </div>
                            </div>

                            <div class="upload-details">
                                <label>
                                    <span>설명</span>
                                    <textarea id="postCaption" placeholder="설명을 입력하세요..." maxlength="2200"></textarea>
                                </label>

                                <label>
                                    <span>위치</span>
                                    <input type="text" id="postLocation" placeholder="위치를 추가하세요" maxlength="100">
                                </label>

                                <div class="upload-preview" id="uploadPreview"></div>

                                <button type="submit" class="share-btn">공유</button>
                                <button type="button" class="cancel-btn" onclick="switchSection('home')">취소</button>
                            </div>
                        </form>
                    </div>
                </section>
            </main>

            <!-- 우측 사이드바 (추천) -->
            <aside class="right-sidebar">
                <div class="suggestions">
                    <div class="suggestions-header">
                        <h3>회원님을 위한 추천</h3>
                        <a href="#">모두 보기</a>
                    </div>
                    <div id="suggestionsList" class="suggestions-list"></div>
                </div>
            </aside>
        </div>
    </div>

    <!-- 포스트 상세 모달 -->
    <div id="postModal" class="modal" style="display: none;">
        <div class="modal-overlay"></div>
        <div class="modal-content post-detail">
            <button class="modal-close" aria-label="닫기">&times;</button>
            <div class="detail-layout">
                <div class="detail-media">
                    <div id="detailImage" class="media-display"></div>
                    <div class="media-nav">
                        <button class="prev-btn" id="prevMediaBtn">‹</button>
                        <span id="mediaCount">1 / 1</span>
                        <button class="next-btn" id="nextMediaBtn">›</button>
                    </div>
                </div>
                <div class="detail-sidebar">
                    <div class="post-header">
                        <div class="author-info">
                            <div id="detailAuthorAvatar" class="avatar">U</div>
                            <div>
                                <strong id="detailAuthorName">사용자명</strong>
                                <div id="detailLocation" class="location">위치</div>
                            </div>
                        </div>
                        <button class="follow-btn" id="followBtn">팔로우</button>
                    </div>

                    <div id="postComments" class="comments"></div>

                    <div class="post-actions">
                        <div class="action-icons">
                            <button id="detailLikeBtn" class="action-btn like-btn" title="좋아요">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                </svg>
                            </button>
                            <button class="action-btn" title="댓글">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                </svg>
                            </button>
                            <button class="action-btn" title="공유">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="18" cy="5" r="3"></circle>
                                    <circle cx="6" cy="12" r="3"></circle>
                                    <circle cx="18" cy="19" r="3"></circle>
                                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                                </svg>
                            </button>
                            <button class="action-btn bookmark-btn" id="bookmarkBtn" title="북마크">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h10l6 6v11a2 2 0 0 1-2 2z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div id="detailLikeCount" class="like-count">0명이 좋아합니다</div>
                    <div id="postDate" class="post-date"></div>

                    <form id="commentForm" class="comment-form">
                        <input type="text" id="commentInput" placeholder="댓글 달기..." maxlength="300">
                        <button type="submit" class="comment-submit">게시</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast 컨테이너 -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="script.js" defer></script>
</body>
</html>
